[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Avalanche Fuji testnet. Set AVALANCHE_RPC_URL + PRIVATE_KEY in your env/.env.
[rpc_endpoints]
fuji = "${AVALANCHE_RPC_URL}"

[etherscan]
# Snowtrace verification (optional). Get a key at snowtrace.io.
fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api-testnet.snowtrace.io/api", chain = 43113 }
